<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R.H Motor Control</title>
    <!-- Load Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom styles for better mobile experience and aesthetics */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
            min-height: 100vh;
        }
        #log-area {
            min-height: 200px;
            max-height: 400px;
            overflow-y: scroll;
            background-color: #1f2937; /* Darker background for log */
            color: #d1fae5; /* Light green text for telemetry */
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            white-space: pre-wrap;
            border: none;
        }
        .data-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: default;
        }
        .data-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px solicitors-2px rgba(0, 0, 0, 0.05);
        }
        /* Ensure the main container is centered vertically on large screens */
        @media (min-width: 1024px) {
            body {
                display: flex;
                justify-content: center;
                align-items: center;
            }
        }
        /* Specific styling for the battery card text to handle large font */
        #card-batt-pct .battery-display {
            font-size: 2.5rem; /* Larger font for primary metric */
            line-height: 1;
        }        /* Styling for the connect button state */
        .btn-connect { background-color: #4f46e5; }
        .btn-connect:hover { background-color: #4338ca; }

        .btn-disconnect { background-color: #ef4444; }
        .btn-disconnect:hover { background-color: #dc2626; }

        /* Custom toggle switch style */
        .toggle-switch .slider {
            background-color: #ccc;
            transition: .4s;
            cursor: pointer;
        }
        .toggle-switch input:checked + .slider {
            background-color: #10b981; /* Green */
        }
        .toggle-switch input:checked + .slider:before {
            transform: translateX(20px);
        }

        /* --- Propeller Spinning Animation CSS --- */
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        /* Apply color to all blades via the 'use' elements and the original path */
        #PropHold use, #PropHold path#prop-blade-path {
            fill: #0cf014; /* Initial green color */
            transition: fill 0.3s ease;
        }

        /* Animation when motor is moving */
        #PropHold.spinning svg {
            animation: spin 0.15s linear infinite; 
        }

        /* Change color of all blades when spinning */
        #PropHold.spinning use, #PropHold.spinning path#prop-blade-path {
            fill: #f59e0b; /* Amber color for moving state */
        }
        /* --- End Propeller Spinning Animation CSS --- */

        /* Disable text selection on buttons to prevent highlight during long press */
        button {
            user-select: none;
            -webkit-user-select: none;
        }
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col items-center">

    <div class="w-full max-w-lg">
        <!-- HEADLINE -->
        <h1 class="text-3xl font-extrabold text-center mb-6 text-gray-900">
            <span class="text-blue-600">R.H</span> Motor Control
        </h1>
        
        <!-- Connection Button/Status Combined -->
        <button id="connectButton" onclick="connectAndRead()" class="w-full p-4 mb-4 rounded-xl text-white font-bold text-lg transition duration-300 shadow-xl btn-connect">
           Ready to scan.
        </button>
        
        <!-- Motor Control Buttons (R, STOP, F) -->
        <div class="grid grid-cols-3 gap-3 mb-4">
            <!-- Reverse Button (Now Grey) -->
            <button id="reverseButton" disabled 
                class="p-4 rounded-xl text-white text-lg font-black transition duration-300 shadow-lg bg-gray-500 hover:bg-gray-600 active:bg-gray-700 disabled:opacity-50 disabled:cursor-not-allowed">
                R (- %)
            </button>

            <!-- STOP Motor Button (Now Pink) -->
            <button id="stopButton" onclick="stopMotor()" disabled class="p-4 rounded-xl text-white font-bold text-lg transition duration-300 shadow-lg bg-pink-600 hover:bg-pink-700 active:bg-pink-800 disabled:opacity-50 disabled:cursor-not-allowed">
                STOP (0%)
            </button>
            
            <!-- Forward Button -->
            <button id="forwardButton" disabled 
                class="p-4 rounded-xl text-white text-lg font-black transition duration-300 shadow-lg bg-green-600 hover:bg-green-700 active:bg-green-800 disabled:opacity-50 disabled:cursor-not-allowed">
                F (+%)
            </button>
        </div>
        
        <!-- Live Data Display (Cards) -->
        <div id="data-container" class="grid grid-cols-3 gap-4 flex-grow mb-6">
            
            <!-- Card 1: Commanded Duty Cycle -->
            <div id="card-duty-target" class="data-card p-4 rounded-xl shadow-lg bg-white border-2 border-green-200 col-span-1">
                <p class="text-xs text-gray-600 font-semibold uppercase tracking-wider">Duty Target</p>
                <p id="currentDutyCycleDisplay" class="text-2xl font-black text-green-700 mt-1">0%</p>
            </div>
            
            <!-- Card 2: Battery Percentage (V%) -->
            <div id="card-batt-pct" class="data-card p-4 rounded-xl shadow-lg bg-white border-2 border-indigo-200 col-span-2">
                <p class="text-xs text-gray-600 font-semibold uppercase tracking-wider">Battery Charge (%)</p>
                <p class="battery-display font-black text-indigo-700 mt-1" data-key="V%">--</p>
            </div>
            
            <!-- Card 3: Voltage (V) -->
            <div id="card-voltage" class="data-card p-3 rounded-xl shadow-md bg-white">
                <p class="text-xs text-gray-500">Voltage (V)</p>
                <p class="text-xl font-extrabold text-indigo-700" data-key="V">--</p>
            </div>
            
            <!-- Card 4: Actual Current (A) -->
            <div id="card-current" class="data-card p-3 rounded-xl shadow-md bg-white">
                <p class="text-xs text-gray-500">Current (A)</p>
                <p class="text-xl font-extrabold text-indigo-700" data-key="A">--</p>
            </div>
            
            <!-- Card 5: VESC/MOSFET Temp (°C) -->
            <div id="card-temp-mos" class="data-card p-3 rounded-xl shadow-md bg-white">
                <p class="text-xs text-gray-500">Temp (°C)</p>
                <p class="text-xl font-extrabold text-indigo-700" data-key="TempMOS">--</p>
            </div>
            
            <!-- Card 6: Amp Hours -->
            <div id="card-amp-hours-metric" class="data-card p-4 rounded-xl shadow-lg bg-white border-2 border-indigo-200 col-span-1">
                <p class="text-xs text-gray-600 font-semibold uppercase tracking-wider">Amp Hours Used (AH)</p>
                <p class="text-2xl font-black text-indigo-700 mt-1" data-key="AH">--</p>
            </div>
            
            <!-- Card 7: Propeller Visual and Run Time -->
            <div id="card-propeller-visual" class="data-card p-4 rounded-xl shadow-lg bg-white border-2 border-indigo-200 col-span-2 flex flex-col justify-between items-center text-center">
                
                <!-- Running Time Display (RT) -->
                <div class="mb-2 w-full">
                    <p class="text-xs text-gray-700 font-semibold uppercase tracking-wider">Run Time</p>
                    <p id="runningTimeDisplay" class="text-xl font-extrabold text-blue-700" data-key="RT">--</p>
                </div>
                
                <!-- Propeller SVG -->
                <div id="PropHold" class="flex-grow flex justify-center items-center">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-14 h-14">
                        <!-- Black center hub -->
                        <circle cx="12" cy="12" r="3" fill="#000000"/>
                        
                        <!-- Single blade definition -->
                        <path id="prop-blade-path" stroke="#000000" stroke-width="0.5" 
                              d="M12 12 C16 8 16 4 12 2 C8 4 8 8 12 12 Z"/>
                        
                        <!-- Blade 1 -->
                        <use href="#prop-blade-path" transform="rotate(0, 12, 12)"/>
                        
                        <!-- Blade 2 -->
                        <use href="#prop-blade-path" transform="rotate(120, 12, 12)"/>
                        
                        <!-- Blade 3 -->
                        <use href="#prop-blade-path" transform="rotate(240, 12, 12)"/>
                    </svg>
                </div>
            </div>
        </div>
        
        <!-- Take Control Button -->
        <div class="flex flex-col mb-8">
            <button id="takeControlButton" onclick="takeControlOverride()" disabled class="w-full p-3 rounded-xl text-white font-bold text-base transition duration-300 shadow-lg bg-yellow-600 hover:bg-yellow-700 disabled:opacity-50 disabled:cursor-not-allowed">
                Take Control
            </button>
        </div>
      
        <!-- DEBUG div -->
        <div class="hidden">
            <div class="flex justify-between items-center mb-3">
                <h2 class="text-xl font-semibold text-gray-800">Raw Telemetry Log</h2>
                <label class="toggle-switch relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="logToggle" class="sr-only">
                    <div class="slider w-10 h-6 bg-gray-300 rounded-full before:absolute before:content-[''] before:h-5 before:w-5 before:rounded-full before:left-0.5 before:bottom-0.5 before:bg-white before:transition-transform"></div>
                    <span class="ml-3 text-sm font-medium text-gray-700">Active</span>
                </label>
            </div>

            <div id="log-area" class="p-3 mb-8 rounded-xl w-full shadow-inner">
                Awaiting connection...
            </div>

            <button onclick="toggleDutyFactorConfig()" class="w-full p-2 mb-4 rounded-xl text-sm font-semibold transition duration-300 shadow-md bg-gray-200 hover:bg-gray-300 text-gray-700">
                Show DutyFactor Config
            </button>

            <div id="dutyFactorConfigCard" class="hidden p-4 mb-6 rounded-xl shadow-xl bg-blue-50 border-2 border-blue-400">
                <h3 class="text-lg font-bold text-blue-700 mb-3">Set Throttle Duty Factor (%)</h3>
                <div class="flex gap-4 items-center">
                    <input type="number" id="dutyFactorInput" min="0" max="100" value="90" class="flex-grow p-2 border border-gray-300 rounded-lg text-lg">
                    <button id="updateDutyFactorButton" onclick="setDutyFactor()" class="p-2 w-24 rounded-lg text-white font-bold transition duration-300 bg-blue-600 hover:bg-blue-700 disabled:opacity-50" disabled>
                        Update
                    </button>
                </div>
                <p id="dutyFactorMessage" class="mt-2 text-sm text-red-500 hidden"></p>
            </div>
        </div>
    </div>

    <script>
        const NUS_SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
        const NUS_TX_CHAR_UUID = '6e400003-b5a3-f393-e0a9-e50e24dcca9e'; 
        const NUS_RX_CHAR_UUID = '6e400002-b5a3-f393-e0a9-e50e24dcca9e'; 
        const METR_PRO_SERVICE_UUID = '0000fef6-0000-1000-8000-00805f9b34fb'; 

        let bleDevice = null;
        let bleServer = null;
        let nusRxCharacteristic = null;
        
        const connectButton = document.getElementById('connectButton'); 
        const logElement = document.getElementById('log-area');
        const takeControlButton = document.getElementById('takeControlButton');
        const forwardButton = document.getElementById('forwardButton');
        const reverseButton = document.getElementById('reverseButton');
        const stopButton = document.getElementById('stopButton');
        const logToggle = document.getElementById('logToggle');
        const propHoldElement = document.getElementById('PropHold');
        
        let currentDutyCycle = 0.00; 
        const DUTY_CYCLE_STEP = 0.05; // Standard step for a tap
        const LONG_PRESS_STEP = 0.02; // 2% step for long press
        const DUTY_CYCLE_MAX = 1.0;  
        const DUTY_CYCLE_MIN = -1.0; 
        let currentMotorAmps = 0.0; 
        const SPIN_THRESHOLD_AMPS = 0.1;
        const MOTOR_DIRECTION = 1; 
        const V_MAX = 54.4; 
        const V_MIN = 42.5; 
        let isControlOverridden = false;

        // Long Press State Variables
        let pressTimer = null;
        let repeatTimer = null;
        
        async function sendSingleCommand(commandStr) {
            if (!nusRxCharacteristic) return false;
            try {
                const encoder = new TextEncoder('utf-8');
                await nusRxCharacteristic.writeValue(encoder.encode(commandStr));
                return true;
            } catch (error) {
                return false;
            }
        }
        
        function stopMotor() {
            if (!isControlOverridden) return;
            currentDutyCycle = 0.00;
            sendSingleCommand(`CMD=A${(currentDutyCycle * MOTOR_DIRECTION).toFixed(2)}`);
            updateDutyCycleDisplay();  
        }

        // Modified adjustment function to accept custom steps
        function adjustDutyCycle(direction, step = DUTY_CYCLE_STEP) {
            if (!isControlOverridden) return;
            currentDutyCycle += direction * step;
            currentDutyCycle = Math.max(DUTY_CYCLE_MIN, Math.min(DUTY_CYCLE_MAX, currentDutyCycle));
            currentDutyCycle = parseFloat(currentDutyCycle.toFixed(2)); 
            sendSingleCommand(`CMD=A${(currentDutyCycle * MOTOR_DIRECTION).toFixed(2)}`);
            updateDutyCycleDisplay();
        }

        // --- LONG PRESS LOGIC IMPLEMENTATION ---

        function startPress(direction) {
            if (!isControlOverridden) return;
            
            // Perform the initial single tap adjustment immediately
            adjustDutyCycle(direction, DUTY_CYCLE_STEP);

            // Set a timer for 500ms before starting the repeat behavior
            pressTimer = setTimeout(() => {
                // Every 500ms thereafter, increase/decrease by 2%
                repeatTimer = setInterval(() => {
                    adjustDutyCycle(direction, LONG_PRESS_STEP);
                }, 300);
            }, 300);
        }

        function endPress() {
            clearTimeout(pressTimer);
            clearInterval(repeatTimer);
        }

        // Attach listeners to buttons
        forwardButton.addEventListener('mousedown', () => startPress(1));
        forwardButton.addEventListener('touchstart', (e) => { e.preventDefault(); startPress(1); });
        
        reverseButton.addEventListener('mousedown', () => startPress(-1));
        reverseButton.addEventListener('touchstart', (e) => { e.preventDefault(); startPress(-1); });

        [forwardButton, reverseButton].forEach(btn => {
            btn.addEventListener('mouseup', endPress);
            btn.addEventListener('mouseleave', endPress);
            btn.addEventListener('touchend', endPress);
        });

        // --- END LONG PRESS LOGIC ---

        async function takeControlOverride() {
            if (!bleDevice || !bleDevice.gatt.connected) return;
            await sendSingleCommand('CMD=OV'); 
            currentDutyCycle = 0.00; 
            await sendSingleCommand(`CMD=A${(currentDutyCycle * MOTOR_DIRECTION).toFixed(2)}`);
            forwardButton.disabled = false;
            reverseButton.disabled = false;
            stopButton.disabled = false;
            takeControlButton.disabled = true; 
            isControlOverridden = true; 
            updateControlOverrideButton(true);
            updateDutyCycleDisplay();
        }
        
        function updateDutyCycleDisplay() {
            const displayValue = (currentDutyCycle * 100).toFixed(0);
            const displayElement = document.getElementById('currentDutyCycleDisplay');
            const card = document.getElementById('card-duty-target');
            displayElement.textContent = `${displayValue}%`;
            card.classList.remove('bg-green-100', 'bg-pink-100', 'border-green-400', 'border-pink-400', 'border-gray-200');
            card.classList.add('bg-white'); 
            if (currentDutyCycle > 0) {
                card.classList.add('bg-green-100', 'border-green-400');
            } else if (currentDutyCycle < 0) {
                card.classList.add('bg-pink-100', 'border-pink-400');
            } else {
                card.classList.add('border-gray-200'); 
            }
        }

        function updateControlOverrideButton(isActive) {
            if (isActive) {
                takeControlButton.textContent = 'Control Active (App)';
                takeControlButton.classList.replace('bg-yellow-600', 'bg-indigo-600');
            } else {
                takeControlButton.textContent = 'Take Control';
                takeControlButton.classList.replace('bg-indigo-600', 'bg-yellow-600');
            }
        }

        function toggleDutyFactorConfig() {
            const card = document.getElementById('dutyFactorConfigCard');
            card.classList.toggle('hidden');
        }
        
        async function setDutyFactor() {
            const val = parseInt(document.getElementById('dutyFactorInput').value);
            if (isNaN(val) || val < 0 || val > 100) return;
            await sendSingleCommand(`SET=Me${val}`);
        }

        async function connectAndRead() {
            if (bleDevice && bleDevice.gatt.connected) {
                bleDevice.gatt.disconnect();
                return;
            }
            try {
                bleDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'VESC_PRIORITY_BRIDGE' }, { namePrefix: 'ESP32' }, { services: [NUS_SERVICE_UUID] }, { services: [METR_PRO_SERVICE_UUID] }],
                    optionalServices: [NUS_SERVICE_UUID, METR_PRO_SERVICE_UUID], 
                });
                bleDevice.addEventListener('gattserverdisconnected', resetAllUI);
                bleServer = await bleDevice.gatt.connect();
                let nusService;
                try { nusService = await bleServer.getPrimaryService(NUS_SERVICE_UUID); } 
                catch(e) { nusService = await bleServer.getPrimaryService(METR_PRO_SERVICE_UUID); }
                const nusTxCharacteristic = await nusService.getCharacteristic(NUS_TX_CHAR_UUID);
                nusRxCharacteristic = await nusService.getCharacteristic(NUS_RX_CHAR_UUID);
                await nusTxCharacteristic.startNotifications();
                nusTxCharacteristic.addEventListener('characteristicvaluechanged', handleCharacteristicValueChanged);
                connectButton.textContent = ` Connected. Click to Disconnect.`;
                connectButton.classList.replace('btn-connect', 'btn-disconnect');
                takeControlButton.disabled = false; 
                document.getElementById('updateDutyFactorButton').disabled = false;
            } catch (error) {
                resetAllUI();
            }
        }

        /**
         * Disables app controls when hardware takes back control (CS=1), 
         * but PRESERVES the BLE connection state.
         */
        function disableControlUI() {
            currentDutyCycle = 0.00;
            updateDutyCycleDisplay();
            updateControlOverrideButton(false);
            [forwardButton, reverseButton, stopButton].forEach(b => b.disabled = true);
            takeControlButton.disabled = false; // Re-enable the ability to take control
        }

        function resetAllUI() {
            bleDevice = null;
            nusRxCharacteristic = null;
            currentDutyCycle = 0.00;
            isControlOverridden = false; 
            currentMotorAmps = 0.0;
            updatePropellerSpin();
            updateDutyCycleDisplay();
            updateControlOverrideButton(false); 
            connectButton.textContent = 'Ready to scan.';
            connectButton.classList.replace('btn-disconnect', 'btn-connect');
            [forwardButton, reverseButton, stopButton, takeControlButton].forEach(b => b.disabled = true);
            document.getElementById('updateDutyFactorButton').disabled = true;
            document.querySelectorAll('[data-key]').forEach(el => el.textContent = '--');
        }

        function updateDataDisplay(data) {
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                let value = data[key];
                if (key === 'V%' && data['V'] !== undefined) {
                    value = Math.max(0, Math.min(100, ((data['V'] - V_MIN) / (V_MAX - V_MIN)) * 100));
                    el.textContent = `${value.toFixed(0)}%`;
                    const card = document.getElementById('card-batt-pct');
                    card.classList.remove('bg-red-100', 'bg-yellow-100', 'bg-green-100', 'border-red-400', 'border-yellow-400', 'border-green-400');
                    if (value <= 20) card.classList.add('bg-red-100', 'border-red-400');
                    else if (value <= 40) card.classList.add('bg-yellow-100', 'border-yellow-400');
                    else card.classList.add('bg-green-100', 'border-green-400');
                } else if (value !== undefined) {
                    el.textContent = typeof value === 'number' ? value.toFixed(key === 'AH' ? 2 : 1) : value;
                }
                if (key === 'A' && value !== undefined) {
                    currentMotorAmps = Math.abs(value);
                    updatePropellerSpin();
                }
            });
        }

        function updatePropellerSpin() {
            if (currentMotorAmps > SPIN_THRESHOLD_AMPS) propHoldElement.classList.add('spinning');
            else propHoldElement.classList.remove('spinning');
        }

        function handleCharacteristicValueChanged(event) {
            const dataString = new TextDecoder('utf-8').decode(event.target.value.buffer);
            const telemetryData = {};
            dataString.split(',').forEach(pair => {
                const [key, valStr] = pair.split('=');
                if (key && valStr) telemetryData[key.trim()] = key.trim() === 'RT' ? valStr.trim() : parseFloat(valStr.trim());
            });
            updateDataDisplay(telemetryData);
            if (telemetryData['CS'] === 1 && isControlOverridden) {
                isControlOverridden = false;
                disableControlUI(); // Fixed: Hardware takes back control, but BLE stays connected
            }
        }
    </script>
</body>
</html>
